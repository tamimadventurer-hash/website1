  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول المهام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --blue-dark: #0D47A1;
            --blue-mid: #1976D2;
            --blue-light: #42A5F5;
            --blue-pale: #E3F2FD;
            --blue-soft: #BBDEFB;
            --accent-dark: #1565C0;
            --accent-mid: #2196F3;
            --accent-light: #90CAF9;
            --accent-pale: #E8F4FD;
            --white: #FFFFFF;
            --white-soft: #FAFBFC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #E8EAF6 0%, #E3F2FD 40%, #BBDEFB 100%);
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -120px; left: -120px;
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(13,71,161,0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatBlob1 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(33,150,243,0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatBlob2 10s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatBlob1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(60px,80px) scale(1.1); }
        }

        @keyframes floatBlob2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-50px,-70px) scale(1.1); }
        }

        .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.7s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--blue-dark), var(--accent-mid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p { color: #5C6B7A; font-size: 0.95rem; }

        .table-card {
            background: var(--white);
            border-radius: 18px;
            box-shadow: 0 10px 45px rgba(13,71,161,0.14);
            overflow: hidden;
            animation: slideUp 0.7s ease-out 0.15s both;
            border: 1px solid rgba(13,71,161,0.08);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table-card::before {
            content: '';
            display: block;
            height: 5px;
            background: linear-gradient(90deg, var(--blue-dark), var(--blue-light), var(--accent-mid), var(--accent-light));
            background-size: 200% 100%;
            animation: gradShift 4s ease infinite;
        }

        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 2px solid var(--blue-pale);
            flex-wrap: wrap;
            gap: 12px;
        }

        .stats { display: flex; gap: 12px; flex-wrap: wrap; }

        .stat-badge {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 13px; border-radius: 30px;
            font-size: 0.8rem; font-weight: 700;
            transition: transform 0.3s;
        }
        .stat-badge:hover { transform: scale(1.05); }
        .stat-badge.total { background: var(--blue-pale); color: var(--blue-dark); }
        .stat-badge.done { background: #E8F8EE; color: #1A9B4A; }
        .stat-badge.problem { background: #FDE8E8; color: #D32F2F; }

        .controls-left { display: flex; gap: 10px; }

        .btn-add, .btn-print {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 20px; border: none; border-radius: 11px;
            font-family: 'Cairo', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
            color: white;
            box-shadow: 0 4px 14px rgba(13,71,161,0.3);
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(13,71,161,0.45); }

        .btn-print {
            background: linear-gradient(135deg, var(--accent-dark), var(--accent-mid));
            color: white;
            box-shadow: 0 4px 14px rgba(21,101,192,0.3);
        }
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(21,101,192,0.45); }

        .progress-bar-container {
            padding: 0 24px 14px;
            display: flex; align-items: center; gap: 10px;
        }

        .progress-track { flex: 1; height: 7px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue-dark), var(--accent-mid));
            border-radius: 10px; transition: width 0.5s;
            background-size: 200% 100%;
            animation: gradShift 3s ease infinite;
        }

        .progress-text { font-size: 0.8rem; font-weight: 700; color: var(--blue-dark); min-width: 38px; text-align: center; }

        .table-wrapper { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }

        thead th {
            padding: 14px 10px;
            font-weight: 700; font-size: 0.88rem;
            text-align: center; color: white;
        }

        thead th:nth-child(1) { background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); width: 50px; }
        thead th:nth-child(2) { background: linear-gradient(135deg, var(--blue-mid), var(--blue-light)); min-width: 200px; }
        thead th:nth-child(3) { background: linear-gradient(135deg, var(--accent-dark), var(--accent-mid)); width: 120px; }
        thead th:nth-child(4) { background: linear-gradient(135deg, var(--accent-mid), var(--accent-light)); min-width: 200px; }
        thead th:nth-child(5) { background: linear-gradient(135deg, var(--blue-dark), var(--accent-dark)); min-width: 200px; }
        thead th:nth-child(6) { width: 45px; background: #78909C; }

        tbody tr {
            transition: all 0.3s;
            animation: fadeInRow 0.4s ease-out both;
        }

        @keyframes fadeInRow {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        tbody tr:nth-child(odd) { background: var(--white-soft); }
        tbody tr:nth-child(even) { background: var(--blue-pale); }
        tbody tr:hover { background: var(--accent-pale); }
        tbody tr.row-done { opacity: 0.65; }
        tbody tr.row-done .task-input { text-decoration: line-through; color: #aaa; }

        tbody td {
            padding: 10px 8px;
            text-align: center;
            vertical-align: top;
            border-bottom: 1px solid rgba(13,71,161,0.06);
        }

        td.row-num { font-weight: 900; font-size: 1.05rem; color: var(--blue-dark); padding-top: 32px; }

        /* التسمية النحيفة */
        .field-label {
            display: block; width: 100%;
            padding: 5px 10px;
            background: linear-gradient(90deg, var(--blue-dark), var(--blue-mid));
            color: white; font-size: 0.72rem; font-weight: 700;
            border-radius: 7px 7px 0 0; text-align: center;
            letter-spacing: 0.5px;
        }

        .field-label.accent { background: linear-gradient(90deg, var(--accent-dark), var(--accent-mid)); }
        .field-label.red { background: linear-gradient(90deg, #C62828, #EF5350); }

        /* حقول الإدخال المشتركة */
        .field-input {
            width: 100%;
            min-height: 48px;
            padding: 8px 12px;
            border: 2px solid #E0E0E0;
            border-top: none;
            border-radius: 0 0 9px 9px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.86rem; font-weight: 600;
            color: #2D3436; background: white;
            resize: vertical; transition: all 0.3s;
            line-height: 1.5;
        }

        .field-input:focus {
            outline: none;
            border-color: var(--blue-mid);
            box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
        }

        .field-input.accent-focus:focus {
            border-color: var(--accent-mid);
            box-shadow: 0 0 0 3px rgba(33,150,243,0.1);
        }

        .field-input.red-focus:focus {
            border-color: #EF5350;
            box-shadow: 0 0 0 3px rgba(239,83,80,0.1);
        }

        .field-input::placeholder { color: #C8C8C8; font-weight: 400; }

        /* أزرار الإنجاز */
        .status-wrap { padding-top: 0; }

        .status-group { display: flex; justify-content: center; gap: 6px; margin-top: 2px; }

        .status-btn {
            width: 38px; height: 38px;
            border: 2px solid #E0E0E0; border-radius: 9px;
            background: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.3s;
            position: relative; overflow: hidden;
        }

        .status-btn::after {
            content: ''; position: absolute; inset: 0; border-radius: 7px;
            opacity: 0; transition: opacity 0.3s;
        }

        .status-btn.check::after { background: linear-gradient(135deg, #1A9B4A, #2ECC71); }
        .status-btn.cross::after { background: linear-gradient(135deg, #D32F2F, #FF6B6B); }
        .status-btn i { position: relative; z-index: 1; color: #C0C0C0; transition: all 0.3s; }

        .status-btn.check.active { border-color: #1A9B4A; box-shadow: 0 3px 10px rgba(26,155,74,0.3); }
        .status-btn.check.active::after { opacity: 1; }
        .status-btn.check.active i { color: white; transform: scale(1.15); }

        .status-btn.cross.active { border-color: #D32F2F; box-shadow: 0 3px 10px rgba(211,47,47,0.3); }
        .status-btn.cross.active::after { opacity: 1; }
        .status-btn.cross.active i { color: white; transform: scale(1.15); }

        .status-btn:hover:not(.active) { border-color: #BDBDBD; transform: translateY(-1px); }

        /* زر حذف */
        .btn-delete {
            width: 32px; height: 32px;
            border: 2px solid #FFD5D5; border-radius: 7px;
            background: white; color: #D32F2F;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; transition: all 0.3s;
            margin: 30px auto 0;
        }

        .btn-delete:hover {
            background: #D32F2F; border-color: #D32F2F; color: white;
            transform: scale(1.1); box-shadow: 0 3px 10px rgba(211,47,47,0.3);
        }

        .table-footer {
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--blue-pale), var(--accent-pale));
            border-top: 2px solid rgba(13,71,161,0.08);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }

        .footer-note { font-size: 0.8rem; color: #78909C; display: flex; align-items: center; gap: 5px; }

        .btn-clear {
            padding: 7px 18px; background: white; color: var(--blue-dark);
            border: 2px solid var(--blue-mid); border-radius: 9px;
            font-family: 'Cairo', sans-serif; font-size: 0.82rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
        }

        .btn-clear:hover {
            background: var(--blue-dark); color: white;
            box-shadow: 0 3px 12px rgba(13,71,161,0.3);
        }

        /* توست */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px; border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 0.88rem; font-weight: 700;
            color: white; box-shadow: 0 8px 28px rgba(0,0,0,0.2);
            z-index: 999; transition: transform 0.4s ease;
            display: flex; align-items: center; gap: 8px;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: linear-gradient(135deg, #1A9B4A, #2ECC71); }
        .toast.info { background: linear-gradient(135deg, var(--accent-dark), var(--accent-mid)); }
        .toast.warning { background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid)); }

        .row-removing { animation: removeRow 0.35s ease-out forwards; }

        @keyframes removeRow {
            to { opacity: 0; transform: translateX(-30px) scale(0.96); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.6rem; }
            .controls { flex-direction: column; }
            .stats, .controls-left { justify-content: center; }
            .table-footer { flex-direction: column; text-align: center; }
            body { padding: 14px 6px; }
        }

        @media print {
            body { background: white; }
            body::before, body::after { display: none; }
            .controls, .progress-bar-container, .table-footer, .btn-delete { display: none !important; }
            .table-card { box-shadow: none; border: 2px solid #333; }
            .table-card::before { display: none; }
            tbody tr:hover { transform: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-clipboard-list"></i> جدول تتبع المهام</h1>
        <p>نظّم مهامك وتابع إنجازها بسهولة ووضوح</p>
    </div>

    <div class="table-card">
        <div class="controls">
            <div class="stats">
                <div class="stat-badge total">
                    <i class="fas fa-list-check"></i>
                    <span>المهام: <b id="totalCount">3</b></span>
                </div>
                <div class="stat-badge done">
                    <i class="fas fa-circle-check"></i>
                    <span>المنجزة: <b id="doneCount">0</b></span>
                </div>
                <div class="stat-badge problem">
                    <i class="fas fa-triangle-exclamation"></i>
                    <span>المشاكل: <b id="problemCount">0</b></span>
                </div>
            </div>
            <div class="controls-left">
                <button class="btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> طباعة
                </button>
                <button class="btn-add" onclick="addRow()">
                    <i class="fas fa-plus"></i> إضافة مهمة
                </button>
            </div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span class="progress-text" id="progressText">0%</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-tasks"></i> المهمة</th>
                        <th><i class="fas fa-check-double"></i> الإنجاز</th>
                        <th><i class="fas fa-flag"></i> المشكلة</th>
                        <th><i class="fas fa-lightbulb"></i> الحل</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="table-footer">
            <span class="footer-note"><i class="fas fa-info-circle"></i> اكتب المشكلة إن وجدت، واضغط صح أو خطأ لتحديد الإنجاز</span>
            <button class="btn-clear" onclick="clearAll()"><i class="fas fa-rotate-right"></i> مسح الكل</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let rowId = 0;

    function addRow() {
        rowId++;
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.setAttribute('data-id', rowId);

        tr.innerHTML = `
            <td class="row-num"></td>
            <td>
                <span class="field-label">المهام</span>
                <textarea class="field-input task-input" placeholder="اكتب المهمة هنا..." rows="2"></textarea>
            </td>
            <td>
                <div class="status-wrap">
                    <span class="field-label accent">تم الإنجاز</span>
                    <div class="status-group">
                        <button class="status-btn check" onclick="setStatus(this,true)" title="تم الإنجاز">
                            <i class="fas fa-check"></i>
                        </button>
                        <button class="status-btn cross" onclick="setStatus(this,false)" title="لم يُنجز">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </div>
                </div>
            </td>
            <td>
                <span class="field-label red">هل فيه مشكلة؟</span>
                <textarea class="field-input red-focus problem-input" placeholder="اكتب المشكلة إن وجدت..." rows="2" oninput="checkProblem(this)"></textarea>
            </td>
            <td>
                <span class="field-label accent">الحل</span>
                <textarea class="field-input accent-focus solution-input" placeholder="اكتب الحل المقترح..." rows="2"></textarea>
            </td>
            <td>
                <button class="btn-delete" onclick="deleteRow(this)" title="حذف">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </td>
        `;

        tbody.appendChild(tr);
        renumberRows();
        updateStats();
        showToast('تمت إضافة مهمة جديدة', 'info');
    }

    function setStatus(btn, isDone) {
        const row = btn.closest('tr');
        const checkBtn = row.querySelector('.status-btn.check');
        const crossBtn = row.querySelector('.status-btn.cross');

        checkBtn.classList.remove('active');
        crossBtn.classList.remove('active');
        row.classList.remove('row-done');

        if (isDone) {
            checkBtn.classList.add('active');
            row.classList.add('row-done');
        } else {
            crossBtn.classList.add('active');
        }
        updateStats();
    }

    function checkProblem(textarea) {
        if (textarea.value.trim().length > 0) {
            textarea.style.borderColor = '#EF5350';
            textarea.style.backgroundColor = '#FFF5F5';
        } else {
            textarea.style.borderColor = '#E0E0E0';
            textarea.style.backgroundColor = 'white';
        }
        updateStats();
    }

    function deleteRow(btn) {
        const row = btn.closest('tr');
        row.classList.add('row-removing');
        setTimeout(() => { row.remove(); renumberRows(); updateStats(); }, 350);
        showToast('تم حذف المهمة', 'warning');
    }

    function renumberRows() {
        document.querySelectorAll('#tableBody tr').forEach((row, i) => {
            row.querySelector('.row-num').textContent = i + 1;
        });
    }

    function updateStats() {
        const rows = document.querySelectorAll('#tableBody tr');
        const total = rows.length;
        let done = 0, problems = 0;

        rows.forEach(row => {
            if (row.querySelector('.status-btn.check.active')) done++;
            const prob = row.querySelector('.problem-input');
            if (prob && prob.value.trim().length > 0) problems++;
        });

        document.getElementById('totalCount').textContent = total;
        document.getElementById('doneCount').textContent = done;
        document.getElementById('problemCount').textContent = problems;

        const percent = total > 0 ? Math.round((done / total) * 100) : 0;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').textContent = percent + '%';
    }

    function clearAll() {
        const rows = document.querySelectorAll('#tableBody tr');
        if (rows.length === 0) return;

        rows.forEach((row, i) => {
            setTimeout(() => row.classList.add('row-removing'), i * 70);
        });

        setTimeout(() => {
            document.getElementById('tableBody').innerHTML = '';
            updateStats();
            showToast('تم مسح جميع المهام', 'warning');
        }, rows.length * 70 + 350);
    }

    function showToast(message, type) {
        const toast = document.getElementById('toast');
        const icons = { success: 'fa-circle-check', info: 'fa-circle-info', warning: 'fa-circle-exclamation' };
        toast.className = 'toast ' + type;
        toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${message}`;
        requestAnimationFrame(() => toast.classList.add('show'));
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    window.addEventListener('DOMContentLoaded', () => {
        for (let i = 0; i < 3; i++) addRow();
        setTimeout(() => document.getElementById('toast').classList.remove('show'), 50);
    });
</script>

</body>
